<app-profile-hero mode="home" />

<section class="tech-stack-section">
  <div class="container">
    <h2 class="section-title">Stack Tecnológico</h2>
    <p class="section-subtitle">Tecnologías con las que trabajo diariamente</p>
    <div class="tech-grid">
      <div class="tech-card">
        <div class="tech-icon-svg"><svg-dotnet [size]="iconSize" /></div>
        <div class="tech-name">.NET Core</div>
      </div>
      <div class="tech-card">
        <div class="tech-icon-svg"><svg-csharp [size]="iconSize" /></div>
        <div class="tech-name">C#</div>
      </div>
      <div class="tech-card">
        <div class="tech-icon-svg"><svg-angular-icon [size]="iconSize" /></div>
        <div class="tech-name">Angular</div>
      </div>
      <div class="tech-card">
        <div class="tech-icon-svg"><svg-typescript [size]="iconSize" /></div>
        <div class="tech-name">TypeScript</div>
      </div>
      <div class="tech-card">
        <div class="tech-icon-svg"><svg-mongodb [size]="iconSize" /></div>
        <div class="tech-name">MongoDB</div>
      </div>
      <div class="tech-card">
        <div class="tech-icon-svg"><svg-sqlserver [size]="iconSize" /></div>
        <div class="tech-name">SQL Server</div>
      </div>
      <div class="tech-card">
        <div class="tech-icon-svg"><svg-git [size]="iconSize" /></div>
        <div class="tech-name">Git</div>
      </div>
      <div class="tech-card">
        <div class="tech-icon-svg"><svg-azure [size]="iconSize" /></div>
        <div class="tech-name">Azure</div>
      </div>
    </div>
  </div>
</section>
