<app-profile-hero mode="about" />

<section class="about-extras">
  <div class="container">

    <div class="stats-grid">
      <div *ngFor="let stat of stats" class="stat-card">
        <div class="stat-value">{{ stat.value }}</div>
        <div class="stat-label">{{ stat.label }}</div>
      </div>
    </div>

    <div class="values-section">
      <h2 class="values-title">Mis Valores</h2>
      <div class="values-grid">
        <div *ngFor="let value of values" class="value-card">
          <div class="value-icon">{{ value.icon }}</div>
          <h3 class="value-title">{{ value.title }}</h3>
          <p class="value-description">{{ value.description }}</p>
        </div>
      </div>
    </div>

    <div class="cta-section">
      <h2>¿Interesado en trabajar juntos?</h2>
      <p>Estoy disponible para nuevos proyectos y oportunidades laborales</p>
      <a routerLink="/contact" class="btn btn-primary btn-lg">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Contáctame
      </a>
    </div>

  </div>
</section>
